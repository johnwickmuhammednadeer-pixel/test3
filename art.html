<!DOCTYPE html>
<html>
<head>
    <title>Simple Design Page</title>
</head>

<body style="margin:0; font-family:Arial, sans-serif; background-color:#f5f5f5;">

    <!-- Header -->
    <div style="background-color:#007bff; color:white; padding:15px; text-align:center;">
        <h1 style="margin:0;">My Website</h1>
    </div>

    <!-- Main Content -->
    <div style="padding:30px; text-align:center;">

        <h2 style="color:#333;">Welcome to My Page</h2>

        <p style="color:#666; font-size:16px;">
            This is a simple HTML design layout using inline styles only.
        </p>

        <!-- Box Section -->
        <div style="display:flex; justify-content:center; gap:20px; margin-top:30px; flex-wrap:wrap;">

            <div style="background:white; padding:20px; width:200px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                <h3>Box 1</h3>
                <p>Simple card design</p>
            </div>

            <div style="background:white; padding:20px; width:200px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                <h3>Box 2</h3>
                <p>Clean layout</p>
            </div>

            <div style="background:white; padding:20px; width:200px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                <h3>Box 3</h3>
                <p>Responsive style</p>
            </div>

        </div>

    </div>

    <!-- Footer -->
    <div style="background-color:#333; color:white; text-align:center; padding:10px; margin-top:40px;">
        <p style="margin:0;">© 2026 My Website</p>
    </div>

</body>
</html>
